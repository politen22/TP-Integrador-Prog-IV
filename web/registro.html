<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - FCAD - UNER</title>
    <link rel="stylesheet" href="css/bootstrap-reboot.min.css" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/estilo.css">
    <script src="js/logout.js" defer></script>
    <script src="js/registro.js" defer></script>
</head>
<body>
    
    <header>
        <div class="contenedor d-flex justify-content-between align-items-center py-3">
            <div class="d-flex align-items-center gap-3">
                <h1>Cursos FCAD - UNER</h1>
                <img src="img/logo.png" alt="Logo FCAD" style="height: 50px;">
            </div>
            
            <div id="caja-usuario" class="text-end">
            </div>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="inscripciones.html">Inscripciones</a></li>
            <li><a href="cursos.html">Cursos</a></li>
            <li><a href="estudiantes.html">Estudiantes</a></li>
        </ul>
    </nav>

    <div class="contenedor-principal">
        <main class="container mt-5 d-flex justify-content-center align-items-start">
            
            <div class="card border-dark shadow" style="width: 100%; max-width: 450px;">
                <div class="card-header bg-dark text-white text-center py-3">
                    <h2 class="h4 mb-0">Registro - Gestión FCAD</h2>
                </div>

                <div class="card-body p-4">
                    <div id="error-registro" class="alert alert-danger text-center" style="display: none;" role="alert"></div>
                    
                    <form id="formulario-registro">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="nombres" class="form-label fw-bold">Nombres</label>
                                <input type="text" class="form-control border-dark" id="nombres" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="apellido" class="form-label fw-bold">Apellido</label>
                                <input type="text" class="form-control border-dark" id="apellido" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="nombre_usuario" class="form-label fw-bold">Usuario de ingreso</label>
                            <input type="text" class="form-control border-dark" id="nombre_usuario" required>
                        </div>

                        <div class="mb-4">
                            <label for="contrasenia" class="form-label fw-bold">Contraseña</label>
                            <input type="password" class="form-control border-dark" id="contrasenia" required>
                        </div>
                        
                        <button type="submit" class="btn btn-success w-100 fw-bold border-dark">Registrar Cuenta</button>
                        
                        <div class="text-center mt-3">
                            <a href="login.html" class="text-decoration-none fw-bold text-secondary" style="font-size: 0.9em;">¿Ya tenés cuenta? Iniciar Sesión</a>
                        </div>
                    </form>
                </div>
            </div>

        </main>
    </div>

    <footer>
    </footer>
</body>
</html>
