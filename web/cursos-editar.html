<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Curso - FCAD - UNER</title>
    <link rel="stylesheet" href="css/bootstrap-reboot.min.css" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/estilo.css">
    <script src="js/logout.js" defer></script>
    <script src="js/cursos-editar.js" defer></script>
</head>

<body>
    <header>
        <div class="contenedor d-flex justify-content-between align-items-center py-3">
            <div class="d-flex align-items-center gap-3">
                <h1>Cursos FCAD - UNER</h1>
                <img src="img/logo.png" alt="Logo FCAD" style="height: 50px;">
            </div>
            
            <div id="caja-usuario" class="text-end">
            </div>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="inscripciones.html">Inscripciones</a></li>
            <li><a href="cursos.html" class="activo">Cursos</a></li>
            <li><a href="estudiantes.html">Estudiantes</a></li>
        </ul>
    </nav>

    <div class="contenedor-principal">
        <main class="container mt-4">
            <h2>Editar Curso Existente</h2>

            <div id="error" class="alert alert-danger mt-3" style="display: none" role="alert"></div>

            <div class="border border-dark p-4 mt-4 shadow-sm bg-white rounded">
                
                <form id="formulario-edicion" style="display: none;">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">ID del Curso:</label>
                        <input type="text" id="idCurso" class="form-control border-dark bg-light" readonly style="font-weight: bold; cursor: not-allowed;">
                    </div>

                    <div class="mb-3">
                        <label for="nombre" class="form-label fw-bold">Nombre:</label>
                        <input type="text" id="nombre" class="form-control border-dark" required>
                    </div>

                    <div class="mb-3">
                        <label for="descripcion" class="form-label fw-bold">Descripción:</label>
                        <textarea id="descripcion" class="form-control border-dark" rows="1" style="resize: none; overflow: hidden;" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="fechaInicio" class="form-label fw-bold">Fecha de Inicio:</label>
                        <input type="date" id="fechaInicio" class="form-control border-dark bg-white" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="cantidadHoras" class="form-label fw-bold">Cantidad de Horas:</label>
                            <input type="number" id="cantidadHoras" class="form-control border-dark" min="1" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="cantidadInscriptos" class="form-label fw-bold">Cupo Máximo:</label>
                            <input type="number" id="cantidadInscriptos" class="form-control border-dark" min="1" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="idCursoEstado" class="form-label fw-bold">Estado del Curso:</label>
                        <select id="idCursoEstado" class="form-select border-dark" required>
                            <option value="1">1 - Borrador</option>
                            <option value="2">2 - Inscripción Abierta</option>
                            <option value="3">3 - Finalizado</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="cursos.html" class="btn btn-secondary fw-bold border-dark">Cancelar</a>
                        <button type="submit" class="btn btn-primary fw-bold border-dark">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
